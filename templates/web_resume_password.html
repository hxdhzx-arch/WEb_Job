<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>访问验证 — 简历页面</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:#0B0F19;color:#F1F5F9;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background-image:
    radial-gradient(ellipse 500px 300px at 30% 30%, rgba(139,92,246,.1) 0%, transparent 70%),
    radial-gradient(ellipse 400px 250px at 70% 60%, rgba(59,130,246,.08) 0%, transparent 70%);
}
.pw-card{
  width:380px;max-width:90vw;padding:40px;text-align:center;
  background:#111827;border:1px solid #1E293B;border-radius:20px;
  box-shadow:0 25px 80px rgba(0,0,0,.5);
}
.pw-icon{
  width:56px;height:56px;margin:0 auto 20px;border-radius:16px;
  background:linear-gradient(135deg,#8B5CF6,#3B82F6);
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;
}
.pw-title{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.pw-sub{font-size:.85rem;color:#64748B;margin-bottom:24px}
.pw-input{
  width:100%;padding:12px 14px;border-radius:8px;
  border:1px solid #334155;background:#1E293B;
  color:#F1F5F9;font-size:.92rem;text-align:center;
  outline:none;transition:all .25s;
}
.pw-input:focus{border-color:#8B5CF6;box-shadow:0 0 0 3px rgba(139,92,246,.15)}
.pw-input::placeholder{color:#475569}
.pw-btn{
  width:100%;padding:13px;border:none;border-radius:8px;margin-top:14px;
  background:linear-gradient(135deg,#8B5CF6,#3B82F6);
  color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;
  transition:all .25s;
}
.pw-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(139,92,246,.3)}
.pw-error{
  margin-top:12px;padding:10px;border-radius:8px;
  background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);
  color:#FB7185;font-size:.82rem;display:none;
}
</style>

<!-- Theme Init -->
<script>
(function(){
  var theme = localStorage.getItem("resumeAI_theme");
  if (!theme) {
    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', theme);
})();
function toggleTheme() {
  var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem("resumeAI_theme", t);
  var icon = document.getElementById("theme-toggle-icon");
  if(icon) {
    icon.textContent = t === 'dark' ? '☀️' : '🌙';
  }
}
</script>

</head>
<body>
<div class="pw-card">
  <div class="pw-icon">🔒</div>
  <div class="pw-title">该简历需要密码访问</div>
  <div class="pw-sub">请输入作者设置的访问密码</div>
  <form id="pw-form">
    <input type="password" class="pw-input" id="pw-input" placeholder="请输入访问密码" required autocomplete="off">
    <button type="submit" class="pw-btn">验 证</button>
  </form>
  <div class="pw-error" id="pw-error">密码错误，请重试</div>
</div>
<script>
document.getElementById('pw-form').addEventListener('submit',function(e){
  e.preventDefault();
  var pw=document.getElementById('pw-input').value;
  var slug=window.location.pathname.replace('/r/','');
  fetch('/r/'+slug+'/verify',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pw})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.success){
      // 用返回的 token 重新访问页面
      window.location.href='/r/'+slug+'?token='+d.data.token;
    } else {
      document.getElementById('pw-error').style.display='block';
      document.getElementById('pw-error').textContent=d.message||'密码错误';
    }
  })
  .catch(function(){
    document.getElementById('pw-error').style.display='block';
    document.getElementById('pw-error').textContent='网络错误，请重试';
  });
});
</script>
</body>
</html>
