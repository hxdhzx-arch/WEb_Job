<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>简历构建台 — System Style</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="ambient-container"><div class="ambient-glow"></div></div>

<nav class="c-nav glass">
  <div class="c-nav-brand">
    <a href="/" class="c-btn c-btn-ghost" style="padding: 4px; font-size: 14px;">← Back</a>
    履历数据台
  </div>
  <div class="c-nav-links">
    <div id="save-indicator" style="font-size:0.8rem;color:var(--c-text-hint); display:inline-flex; align-items:center;"></div>
    <select id="theme-selector" class="c-input" style="width:auto; padding: 4px 12px; height:28px; font-size: 0.8rem; border-radius:14px; background:var(--c-bg-sub); border:none;" onchange="updateTheme()">
      <option value="light">Mac Light</option>
      <option value="dark">Dark Mode</option>
    </select>
    <button class="c-btn c-btn-primary" onclick="openPublishModal()" style="height:28px; font-size: 0.8rem; padding: 0 16px;">发布</button>
  </div>
</nav>

<div class="ed-layout">
  
  <!-- Left Panel -->
  <div class="ed-sidebar glass">
    <div class="ed-panel-header">工具箱</div>
    
    <div class="ed-panel-body" style="padding-top:12px;">
      <button class="ed-block-btn" onclick="addBlock('hero')"><span class="ed-block-icon">T</span>抬头节点</button>
      <button class="ed-block-btn" onclick="addBlock('intro')"><span class="ed-block-icon">P</span>执行概要</button>
      <button class="ed-block-btn" onclick="addBlock('list_work')"><span class="ed-block-icon">W</span>履历轴</button>
      <button class="ed-block-btn" onclick="addBlock('list_edu')"><span class="ed-block-icon">E</span>学术记录</button>
      <button class="ed-block-btn" onclick="addBlock('list_projects')"><span class="ed-block-icon">R</span>核心项目</button>
      <button class="ed-block-btn" onclick="addBlock('skills')"><span class="ed-block-icon">S</span>技能堆栈</button>
      <button class="ed-block-btn" onclick="addBlock('certs')"><span class="ed-block-icon">C</span>认证</button>
    </div>
  </div>

  <!-- Center Canvas -->
  <div class="ed-canvas-wrapper">
    <!-- device toggle strictly minimalist -->
    <div style="position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:90; display:flex; gap:8px; background:var(--c-bg-glass); padding:4px; border-radius:var(--r-pill); border:1px solid var(--c-border); backdrop-filter:blur(10px);">
      <button class="c-btn c-btn-ghost active" style="padding:4px 12px; font-size:0.75rem" onclick="setDevice('desktop', this)">Desk</button>
      <button class="c-btn c-btn-ghost" style="padding:4px 12px; font-size:0.75rem" onclick="setDevice('mobile', this)">Mobile</button>
    </div>
    
    <div class="ed-canvas-container">
      <div class="ed-frame" id="canvas-frame">
        <iframe id="preview-iframe" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
      </div>
    </div>
  </div>

  <!-- Right Inspector -->
  <div class="ed-sidebar ed-sidebar-right glass" id="inspector-panel">
    <div class="ed-panel-header" style="justify-content: space-between;">
      <span>检查器</span>
    </div>
    <div class="ed-inspector-empty" id="inspector-empty">
      未选定节点。
    </div>
    <div class="ed-panel-body" id="inspector-content" style="display:none; padding-top:12px;">
        <!-- Dynamic Settings -->
    </div>
  </div>
</div>

<!-- Publish Modal -->
<div class="c-modal-overlay" id="publish-modal">
  <div class="c-modal glass">
    <div class="c-modal-header">
      <h3 class="c-modal-title">推送到发布器</h3>
      <button class="c-modal-close" onclick="closePublishModal()">×</button>
    </div>
    <div class="c-modal-body" style="padding-top:20px;">
      
      <div class="ed-grouped-list">
        <div class="ed-grouped-item">
          <label>URL Slug</label>
          <input type="text" id="pub-slug" placeholder="留空自动分配">
        </div>
        <div class="ed-grouped-item">
          <label>访问密码</label>
          <input type="password" id="pub-password" placeholder="留空为公开">
        </div>
      </div>
      
      <div class="ed-grouped-list">
        <div class="ed-grouped-item" style="flex-direction:column; align-items:flex-start; gap:8px;">
          <label style="font-size: 0.75rem; text-transform:uppercase; color:var(--c-text-muted);">SEO 标签</label>
          <input type="text" id="pub-seo-title" placeholder="索引标题" style="width:100%; text-align:left; font-size:1rem; color:var(--c-text-main);">
        </div>
        <div class="ed-grouped-item">
          <textarea id="pub-seo-desc" placeholder="简要快照..." class="c-textarea" style="border:none; padding:0; background:transparent; font-size:0.85rem; height:50px; min-height:50px; outline:none; color:var(--c-text-muted);"></textarea>
        </div>
      </div>

    </div>
    <div class="c-modal-footer">
      <button class="c-btn c-btn-primary w-full" style="padding:14px; font-weight:600;" onclick="confirmPublish()" id="pub-confirm-btn">确认发布</button>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="c-modal-overlay" id="publish-success-modal">
  <div class="c-modal glass" style="align-items:center; text-align:center; padding:30px;">
    <h3 class="c-modal-title" style="margin-bottom:12px;">已成功上线</h3>
    <p class="c-p" style="font-size:0.9rem;">您的只读简历已被云端容器索引，可通过下方链接访达。</p>
    <a href="#" id="pub-success-url" target="_blank" style="display:inline-block; margin: 24px 0; font-family:monospace; color:var(--c-accent); text-decoration:underline;"></a>
    <button class="c-btn c-btn-secondary w-full" onclick="closeSuccessModal()">完成</button>
  </div>
</div>

<div class="c-toast" id="wr-toast"></div>

<!-- JS Controller -->
<script>
const TOKEN = localStorage.getItem('token') || localStorage.getItem('admin_token');
let currentResumeId = new URLSearchParams(window.location.search).get('id') || null;

const EditorState = {
    theme: 'light',
    blocks: [],
    selectedBlockId: null,
    hasUnsavedChanges: false,
    autoSaveTimer: null
};

// Utils
function generateId() { return Math.random().toString(36).substr(2, 9); }
function toast(msg, type='success') {
  const el = document.getElementById('wr-toast');
  el.textContent = msg; el.className = 'c-toast ' + type + ' show';
  clearTimeout(el._t); el._t = setTimeout(()=> el.classList.remove('show'), 2000);
}

function setDevice(type, el) {
    el.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    const frame = document.getElementById('canvas-frame');
    if(type==='mobile') frame.classList.add('mobile');
    else frame.classList.remove('mobile');
}

// Init
window.onload = async () => {
    if(currentResumeId && TOKEN) {
        try {
            const res = await fetch('/api/v1/resume/' + currentResumeId, {headers: {'Authorization': 'Bearer '+TOKEN}});
            const d = await res.json();
            if(d.success && d.data.resume_data) {
                if(d.data.resume_data.blocks) { EditorState.blocks = d.data.resume_data.blocks; } 
                else { EditorState.blocks = [{ id: generateId(), type: 'hero', visible: true, style:{layout:'left', variant:'minimal'}, content:{name:'系统待载入', job:'配置空缺'} }]; }
                if(d.data.web_config && d.data.web_config.theme) { EditorState.theme = d.data.web_config.theme; }
            }
        } catch(e) { }
    } else {
        EditorState.blocks = [
            { id: generateId(), type: 'hero', visible: true, style: { layout: 'left', variant: 'minimal' }, content: { name: '您的姓名', job: '您的角色头衔' } }
        ];
    }
    document.getElementById('theme-selector').value = EditorState.theme;
    renderCanvas();
};

function updateTheme() {
    EditorState.theme = document.getElementById('theme-selector').value;
    scheduleAutoSave(); renderCanvas();
}

function addBlock(type) {
    const b = { id: generateId(), type, visible: true, style: { layout: 'left', variant: 'card' }, content: {} };
    if(type==='hero') b.content = {name:'Your Name', job:'Your Role', meta:['Location']};
    if(type==='intro') { b.title='个人简介'; b.content={text:'Write something...'}; }
    if(type==='list_work') { b.title='工作经历'; b.content={items:[{title:'Company', subtitle:'Role', time:'2022-Present', desc:['Did something awesome']}]}; }
    if(type==='list_edu') { b.title='教育背景'; b.content={items:[{title:'University', subtitle:'Major', time:'2018-2022', desc:['Bachelor']}]}; }
    if(type==='list_projects') { b.title='项目经验'; b.content={items:[{title:'Project', subtitle:'Role', time:'2023', desc:['Built X']}]}; }
    if(type==='skills') { b.title='技能清单'; b.content={tags:['A', 'B']}; }
    
    EditorState.blocks.push(b);
    selectBlock(b.id);
    scheduleAutoSave();
    renderCanvas();
}

function duplicateBlock(idx) {
    const copy = JSON.parse(JSON.stringify(EditorState.blocks[idx]));
    copy.id = generateId();
    EditorState.blocks.splice(idx+1, 0, copy);
    selectBlock(copy.id); scheduleAutoSave(); renderCanvas();
}

function deleteBlock(id) {
    EditorState.blocks = EditorState.blocks.filter(b => b.id !== id);
    if(EditorState.selectedBlockId === id) selectBlock(null);
    scheduleAutoSave(); renderCanvas();
}

// --- Render ---
let isRendering = false;
async function renderCanvas() {
    if(isRendering) return;
    isRendering = true;
    
    const payload = { resume_data: { blocks: EditorState.blocks }, web_config: { theme: EditorState.theme } };
    
    try {
        const res = await fetch('/api/v1/resume/render-preview', {
            method: 'POST', headers: { 'Content-Type': 'application/json', ...(TOKEN ? {'Authorization': 'Bearer '+TOKEN} : {}) },
            body: JSON.stringify(payload)
        });
        const d = await res.json();
        if(d.success) {
            const html = d.data.html.replace('</body>', `
            <style>
              .wr2-block { position:relative; cursor:pointer; }
              .wr2-block:hover::after { content:''; position:absolute; inset:0; border:1px solid rgba(0,0,0,0.1); border-radius:inherit; pointer-events:none; }
              .wr2-block.selected::after { content:''; position:absolute; inset:0; border:2px solid #0066CC; border-radius:inherit; pointer-events:none; box-shadow: 0 4px 12px rgba(0,102,204,0.1); }
            </style>
            <script>
                document.querySelectorAll('.wr2-block').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // remove selected
                        document.querySelectorAll('.wr2-block').forEach(node => node.classList.remove('selected'));
                        el.classList.add('selected');
                        const id = el.id.replace('wr2-block-', '');
                        window.parent.postMessage({ type: 'block_selected', id }, '*');
                    });
                });
            <\/script>
            </body>`);
            document.getElementById('preview-iframe').srcdoc = html;
        }
    } catch(e) { } finally { isRendering = false; }
}

window.addEventListener('message', (e) => {
    if(e.data?.type === 'block_selected') {
        selectBlock(e.data.id);
    }
});

// --- Inspector (Apple Style Grouped) ---
function selectBlock(id) {
    EditorState.selectedBlockId = id;
    const inspector = document.getElementById('inspector-content');
    const empty = document.getElementById('inspector-empty');
    if(!id) { inspector.style.display = 'none'; empty.style.display = 'block'; return; }
    
    empty.style.display = 'none'; inspector.style.display = 'block';
    
    const idx = EditorState.blocks.findIndex(b => b.id === id);
    const b = EditorState.blocks[idx];
    if(!b) return;
    
    let html = `
        <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
            <div style="display:flex; gap:4px;">
              <button class="c-btn c-btn-secondary" style="padding:4px 8px;" onclick="moveBlock(${idx}, -1)" ${idx===0?'disabled':''}>↑</button>
              <button class="c-btn c-btn-secondary" style="padding:4px 8px;" onclick="moveBlock(${idx}, 1)" ${idx===EditorState.blocks.length-1?'disabled':''}>↓</button>
            </div>
            <div style="display:flex; gap:4px;">
              <button class="c-btn c-btn-secondary" style="padding:4px 8px;" onclick="duplicateBlock(${idx})">⧉</button>
              <button class="c-btn c-btn-primary" style="padding:4px 8px;background:var(--c-danger);" onclick="deleteBlock('${id}')">销毁</button>
            </div>
        </div>

        <div class="ed-grouped-list">
            <div class="ed-grouped-item" style="border-bottom:none; padding-bottom:8px;">
                <label style="font-size: 0.75rem; text-transform:uppercase; color:var(--c-text-muted);">排版对齐</label>
            </div>
            <div style="padding: 0 16px 12px;">
                <div class="ed-segmented">
                    <label class="ed-seg-btn ${b.style.layout!=='center'&&b.style.layout!=='right'?'active':''}"><input type="radio" value="left" style="display:none;" ${b.style.layout!=='center'&&b.style.layout!=='right'?'checked':''} onchange="updateBlockStyle('${id}','layout',this.value)">流式靠边</label>
                    <label class="ed-seg-btn ${b.style.layout==='center'?'active':''}"><input type="radio" value="center" style="display:none;" ${b.style.layout==='center'?'checked':''} onchange="updateBlockStyle('${id}','layout',this.value)">严格居中</label>
                </div>
            </div>

            <div class="ed-grouped-item" style="border-bottom:none; border-top:1px solid var(--c-border); padding-bottom:8px; padding-top:12px;">
                <label style="font-size: 0.75rem; text-transform:uppercase; color:var(--c-text-muted);">视觉隔离度</label>
            </div>
            <div style="padding: 0 16px 16px;">
                <div class="ed-segmented">
                    <label class="ed-seg-btn ${b.style.variant!=='card'&&b.style.variant!=='outline'&&b.style.variant!=='solid'?'active':''}"><input type="radio" value="minimal" style="display:none;" onchange="updateBlockStyle('${id}','variant',this.value)">纯净</label>
                    <label class="ed-seg-btn ${b.style.variant==='card'?'active':''}"><input type="radio" value="card" style="display:none;" onchange="updateBlockStyle('${id}','variant',this.value)">投影</label>
                    <label class="ed-seg-btn ${b.style.variant==='outline'?'active':''}"><input type="radio" value="outline" style="display:none;" onchange="updateBlockStyle('${id}','variant',this.value)">素边</label>
                    <label class="ed-seg-btn ${b.style.variant==='solid'?'active':''}"><input type="radio" value="solid" style="display:none;" onchange="updateBlockStyle('${id}','variant',this.value)">强涂</label>
                </div>
            </div>
        </div>
    `;

    // Dynamic props mapped to grouped items
    let innerFields = '';
    if(b.title !== undefined) innerFields += renderGroupedRow(id, 'title', '标头名称', b.title);
    
    if(b.type === 'hero') {
        innerFields += renderGroupedRow(id, 'name', '主标识', b.content.name||'');
        innerFields += renderGroupedRow(id, 'job', '职级设定', b.content.job||'');
        innerFields += renderGroupedRow(id, 'avatar', '图层 URL', b.content.avatar||'');
    } else if(b.type === 'intro' || b.type === 'certs') {
        innerFields += `<div class="ed-grouped-item" style="flex-direction:column; align-items:stretch; gap:6px; border-bottom:none;"><label style="font-size: 0.75rem; color:var(--c-text-muted);">内容束</label><textarea class="c-textarea" style="border:none;background:transparent;padding:0;font-size:0.85rem;" oninput="updateBlockContent('${id}','text',this.value)">${b.content.text||''}</textarea></div>`;
    } else if(b.type === 'skills') {
        innerFields += `<div class="ed-grouped-item" style="flex-direction:column; align-items:stretch; gap:6px; border-bottom:none;"><label style="font-size: 0.75rem; color:var(--c-text-muted);">技能栈逗号组合</label><textarea class="c-textarea" style="border:none;background:transparent;padding:0;font-size:0.85rem;" oninput="updateBlockContent('${id}','tags',this.value.split(',').map(s=>s.trim()))">${(b.content.tags||[]).join(', ')}</textarea></div>`;
    }

    if(innerFields) html += `<div class="ed-grouped-list">${innerFields}</div>`;

    if (['list_work', 'list_edu', 'list_projects'].includes(b.type)) {
        html += `<div style="font-size: 0.75rem; text-transform:uppercase; color:var(--c-text-muted); margin-bottom:8px; padding-left:4px;">阵列记录</div>`;
        html += `<div class="ed-list-ui">`;
        (b.content.items || []).forEach((item, j) => {
            html += `
            <div class="ed-list-row">
                <button class="ed-list-close" onclick="removeListItem('${id}', ${j})">×</button>
                <input placeholder="主标题" style="font-weight:600; color:var(--c-text-main);" value="${item.title||''}" oninput="updateListItem('${id}',${j},'title',this.value)">
                <input placeholder="副说明" value="${item.subtitle||''}" oninput="updateListItem('${id}',${j},'subtitle',this.value)">
                <input placeholder="轨迹线如: 2023 - 2024" value="${item.time||''}" oninput="updateListItem('${id}',${j},'time',this.value)">
                <textarea placeholder="描述点 (多行数组)" oninput="updateListItem('${id}',${j},'desc',this.value)" rows="3" style="border:none; margin-top:4px;">${(item.desc||[]).join('\\n')}</textarea>
            </div>`;
        });
        html += `</div>`;
        html += `<button class="c-btn c-btn-ghost w-full" style="border:1px dashed var(--c-border); color:var(--c-text-muted);" onclick="addListItem('${id}')">+ 新增容器</button>`;
    }
    
    inspector.innerHTML = html;
}

function renderGroupedRow(id, propKey, label, val) {
    if(propKey === 'title') {
        return `<div class="ed-grouped-item"><label>${label}</label><input type="text" value="${val}" oninput="updateBlockProp('${id}','${propKey}',this.value)"></div>`;
    }
    return `<div class="ed-grouped-item"><label>${label}</label><input type="text" value="${val}" oninput="updateBlockContent('${id}','${propKey}',this.value)"></div>`;
}

// Interacting with state
function updateBlockProp(id, key, val) { const b = EditorState.blocks.find(b=>b.id===id); if(b) { b[key] = val; scheduleAutoSave(); renderCanvas(); } }
function updateBlockStyle(id, key, val) { const b = EditorState.blocks.find(b=>b.id===id); if(b) { b.style[key] = val; scheduleAutoSave(); renderCanvas(); } }
function updateBlockContent(id, key, val) { const b = EditorState.blocks.find(b=>b.id===id); if(b) { b.content[key] = val; scheduleAutoSave(); renderCanvas(); } }
function moveBlock(idx, dir) {
    if(idx+dir < 0 || idx+dir >= EditorState.blocks.length) return;
    const temp = EditorState.blocks[idx]; EditorState.blocks[idx] = EditorState.blocks[idx+dir]; EditorState.blocks[idx+dir] = temp;
    scheduleAutoSave(); renderCanvas(); selectBlock(EditorState.selectedBlockId);
}
function updateListItem(blockId, idx, key, val) {
    const b = EditorState.blocks.find(b=>b.id===blockId);
    if(b && b.content.items && b.content.items[idx]) {
        if(key==='desc') b.content.items[idx][key] = val.split('\\n').filter(Boolean);
        else b.content.items[idx][key] = val;
        scheduleAutoSave(); renderCanvas();
    }
}
function addListItem(blockId) {
    const b = EditorState.blocks.find(b=>b.id===blockId);
    if(b) {
        if(!b.content.items) b.content.items = [];
        b.content.items.push({});
        scheduleAutoSave(); renderCanvas(); selectBlock(blockId);
    }
}
function removeListItem(blockId, idx) {
    const b = EditorState.blocks.find(b=>b.id===blockId);
    if(b && b.content.items) {
        b.content.items.splice(idx, 1);
        scheduleAutoSave(); renderCanvas(); selectBlock(blockId);
    }
}

// --- AUTO SAVE ---
function scheduleAutoSave() {
    EditorState.hasUnsavedChanges = true;
    const ind = document.getElementById('save-indicator');
    ind.textContent = '队列中...'; ind.style.color='var(--c-warning)';
    clearTimeout(EditorState.autoSaveTimer); EditorState.autoSaveTimer = setTimeout(performAutoSave, 1500);
}

async function performAutoSave() {
    if(!TOKEN) return;
    const payload = {
        resume_id: currentResumeId, project_id: currentResumeId,
        resume_data: { blocks: EditorState.blocks },
        web_config: { theme: EditorState.theme }
    };
    try {
        const res = await fetch('/api/v1/resume/auto-save', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
            body: JSON.stringify(payload)
        });
        const d = await res.json();
        if(d.success) {
            currentResumeId = d.data.resume_id;
            const url = new URL(window.location);
            if(!url.searchParams.get('id')) { url.searchParams.set('id', currentResumeId); window.history.replaceState({}, '', url); }
            EditorState.hasUnsavedChanges = false;
            const ind = document.getElementById('save-indicator');
            ind.textContent = '已保存'; ind.style.color='var(--c-text-muted)';
        }
    } catch(e) { }
}
window.onbeforeunload = function(e){ if(EditorState.hasUnsavedChanges){ const msg="未保存。"; e.returnValue=msg; return msg; } };

// --- PUBLISH ---
function openPublishModal() {
  if(!TOKEN) { toast("无授权。", "error"); return; }
  const hero = EditorState.blocks.find(b=>b.type==='hero');
  const name = hero?.content?.name || '履历';
  document.getElementById('pub-seo-title').value = `${name}的工作履历协议`;
  document.getElementById('publish-modal').classList.add('show');
}
function closePublishModal() { document.getElementById('publish-modal').classList.remove('show'); }
function closeSuccessModal() { document.getElementById('publish-success-modal').classList.remove('show'); }

async function confirmPublish() {
  const btn = document.getElementById('pub-confirm-btn');
  btn.disabled = true; btn.textContent = '执行中...';
  
  const payload = {
    resume_id: currentResumeId,
    resume_data: { blocks: EditorState.blocks },
    web_config: { theme: EditorState.theme },
    slug: document.getElementById('pub-slug').value.trim(),
    password: document.getElementById('pub-password').value,
    seo_title: document.getElementById('pub-seo-title').value.trim(),
    seo_description: document.getElementById('pub-seo-desc').value.trim()
  };
  
  try {
    const res = await fetch('/api/v1/resume/publish', {
      method: 'POST', headers: { "Content-Type": "application/json", "Authorization": "Bearer " + TOKEN },
      body: JSON.stringify(payload)
    });
    const d = await res.json();
    if(d.success) {
      currentResumeId = d.data.resume_id;
      EditorState.hasUnsavedChanges = false;
      closePublishModal();
      const fullUrl = window.location.origin + d.data.url;
      document.getElementById('pub-success-url').href = fullUrl;
      document.getElementById('pub-success-url').textContent = fullUrl;
      document.getElementById('publish-success-modal').classList.add('show');
    } else { toast(d.message || "挂载失败", 'error'); }
  } catch(e) { toast("网络超时断层", 'error'); } 
  finally { btn.disabled = false; btn.textContent = '确认发布'; }
}
</script>
</body>
</html>
