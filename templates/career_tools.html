<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>职场通工具箱 — 简历 AI</title>
<meta name="description" content="实用的职场小工具：税后薪资计算、Offer 对比 AI 决策">
<link rel="stylesheet" href="/static/style.css">
<script>
(function(){
  var theme = localStorage.getItem("saas_theme");
  if (!theme) theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', theme);
})();
function toggleTheme() {
  var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem("saas_theme", t);
  var icon = document.getElementById("theme-toggle-icon");
  if(icon) icon.textContent = t === 'dark' ? '☀️' : '🌙';
}
</script>
</head>
<body class="page-career-tools">

<!-- Nav -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">简历 AI <span>BETA</span></a>
    <div class="nav-links">
      <a href="/" class="nav-link">首页</a>
      <a href="/resume" class="nav-link">诊断</a>
      <a href="/jd" class="nav-link">JD 匹配</a>
      <a href="/builder" class="nav-link">生成简历</a>
      <a href="/web-resume" class="nav-link">简历站</a>
      <a href="/personal-site" class="nav-link-pro">个人网站</a>
      <a href="/career-tools" class="nav-link active">工具</a>
      <button onclick="toggleTheme()" class="nav-link" style="background:transparent;border:none;cursor:pointer;font-size:1rem;padding:6px 8px;" title="切换显示模式">
        <span id="theme-toggle-icon">🌙</span>
      </button>
    </div>
  </div>
</nav>
<script>
  setTimeout(function(){
    var t = document.documentElement.getAttribute('data-theme');
    var icon = document.getElementById("theme-toggle-icon");
    if (icon) icon.textContent = t === 'dark' ? '☀️' : '🌙';
  },0);
</script>

<!-- Hero -->
<section class="ct-hero">
  <h1>职场工具箱</h1>
  <p>为你提供实用的职场小工具，解决薪资计算、Offer 选择等常见痛点，助你轻松应对求职决策。</p>
</section>

<!-- Tools Grid -->
<div class="tools-grid">

  <!-- Tool 1: Salary Calculator -->
  <div class="tool-card">
    <div class="tool-card-title">
      税后月薪计算器
      <span class="tool-card-badge">快速估算</span>
    </div>
    <div class="calc-form">
      <div class="calc-row">
        <label>税前月薪 (元)</label>
        <input type="number" id="pre-tax-salary" class="calc-input" placeholder="例如: 20000">
      </div>
      <div class="calc-row">
        <label>所在城市</label>
        <select id="city-select" class="calc-input">
          <option value="bj">北京 (公积金默认 12%)</option>
          <option value="sh">上海 (公积金默认 7%)</option>
          <option value="gz">广州 (公积金默认 12%)</option>
          <option value="sz">深圳 (公积金默认 12%)</option>
          <option value="other">其他城市 (五险一金约扣 20%)</option>
        </select>
      </div>
      <button class="btn-calc" onclick="calculateSalary()">计算税后收入</button>
    </div>

    <div class="calc-result" id="salary-result" style="display:none">
      <div class="cr-title">预计税后月薪约</div>
      <div class="cr-money">¥<span id="res-net">0</span></div>
      <div class="cr-detail">
        <span>五险一金扣除: ¥<span id="res-ins">0</span></span>
        <span>个人所得税: ¥<span id="res-tax">0</span></span>
      </div>
      <div style="font-size:0.72rem;color:var(--c-text-muted);margin-top:10px">* 此为简化估算模型，不含专项附加扣除，仅供择业参考。</div>
    </div>
  </div>

  <!-- Tool 2: Offer Comparator -->
  <div class="tool-card">
    <div class="tool-card-title">
      Offer 决策仪
      <span class="tool-card-badge">AI 辅助决策</span>
    </div>
    <p class="tool-card-desc">纠结选哪个 Offer？录入几个关键指标，AI 帮你客观点评，选出性价比王。</p>

    <div id="offer-container" class="offer-list"></div>
    <button class="add-offer-btn" onclick="addOffer()">+ 添加一个 Offer 对比项</button>
    <button id="btn-compare" class="btn-compare" onclick="compareOffers()">开始 AI 综合对比评估</button>
    <div id="compare-result" class="compare-result" style="display:none">
      <h3>AI 决策建议</h3>
      <div id="compare-text" style="font-size:0.85rem;line-height:1.7;color:var(--c-text-main);white-space:pre-wrap"></div>
    </div>
  </div>

</div>

<script>
// --- Calculator Logic ---
function calculateSalary(){
  var pre=parseFloat(document.getElementById('pre-tax-salary').value);
  if(isNaN(pre)||pre<=0){alert("请输入有效的税前月薪");return;}
  var city=document.getElementById('city-select').value;
  var insRate=0.20;
  if(city==="bj")insRate=0.105+0.12;
  else if(city==="sh")insRate=0.105+0.07;
  else if(city==="gz")insRate=0.105+0.12;
  else if(city==="sz")insRate=0.105+0.12;
  var maxBase=30000;
  var base=pre>maxBase?maxBase:pre;
  var ins=base*insRate;
  var taxBase=pre-ins-5000;
  var tax=0;
  if(taxBase>0){
    if(taxBase<=3000)tax=taxBase*0.03;
    else if(taxBase<=12000)tax=taxBase*0.1-210;
    else if(taxBase<=25000)tax=taxBase*0.2-1410;
    else if(taxBase<=35000)tax=taxBase*0.25-2660;
    else if(taxBase<=55000)tax=taxBase*0.3-4410;
    else if(taxBase<=80000)tax=taxBase*0.35-7160;
    else tax=taxBase*0.45-15160;
  }
  var net=pre-ins-tax;
  document.getElementById('res-net').innerText=net.toFixed(2);
  document.getElementById('res-ins').innerText=ins.toFixed(2);
  document.getElementById('res-tax').innerText=tax.toFixed(2);
  document.getElementById('salary-result').style.display='block';
}

// --- Offer Comparator Logic ---
var ofCount=0;
function addOffer(){
  if(ofCount>=3){alert("最多对比 3 个 Offer");return;}
  ofCount++;
  var id=Date.now()+Math.floor(Math.random()*100);
  var html='\
    <div class="offer-item" id="offer-'+id+'">\
      '+(ofCount>1?'<div class="remove-offer" onclick="removeOffer('+id+')">删除</div>':'')+'\
      <h4>Offer '+ofCount+'</h4>\
      <div class="offer-grid">\
        <label>公司名称<input type="text" class="calc-input off-comp" placeholder="如: 字节跳动"></label>\
        <label>月薪(元)<input type="number" class="calc-input off-sal" placeholder="如: 25000"></label>\
        <label>年终奖(月)<input type="number" class="calc-input off-bonus" placeholder="如: 3" value="0"></label>\
        <label>通勤(分钟)<input type="number" class="calc-input off-commute" placeholder="单程如: 45"></label>\
        <label>工作强度<select class="calc-input off-wt"><option value="965">965 (双休)</option><option value="995">995 (稍微加班)</option><option value="996">996 (单休高压)</option><option value="大小周">大小周</option></select></label>\
      </div>\
    </div>';
  document.getElementById('offer-container').insertAdjacentHTML('beforeend',html);
}
function removeOffer(id){
  document.getElementById('offer-'+id).remove();
  ofCount--;
  var items=document.querySelectorAll('.offer-item h4');
  for(var i=0;i<items.length;i++){items[i].innerText='Offer '+(i+1);}
}

// Init two offers
addOffer();
addOffer();

function compareOffers(){
  var items=document.querySelectorAll('.offer-item');
  var offers=[];
  for(var i=0;i<items.length;i++){
    var c=items[i].querySelector('.off-comp').value;
    var s=items[i].querySelector('.off-sal').value;
    var b=items[i].querySelector('.off-bonus').value;
    var co=items[i].querySelector('.off-commute').value;
    var w=items[i].querySelector('.off-wt').value;
    if(!c||!s){alert("请填全第 "+(i+1)+" 个 Offer 的公司名和薪资");return;}
    offers.push("公司:"+c+", 月薪:"+s+", 年终:"+b+"个月, 单程通勤:"+co+"分, 强度:"+w);
  }
  var btn=document.getElementById('btn-compare');
  var res=document.getElementById('compare-result');
  var text=document.getElementById('compare-text');
  btn.disabled=true;
  btn.innerText="AI 分析中...";
  res.style.display="none";
  var prompt=offers.join("\n")+"\n\n请作为资深职场导师，对上述 Offer 进行客观的量化性价比分析（考虑时薪、通勤折损等），指出每个Offer的优劣，并最终给出明确的选择建议。字数不超过 400 字。";
  fetch("/api/career-advisor",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user_query:prompt,type:"offer_compare"})
  })
  .then(function(resp){return resp.json();})
  .then(function(data){
    text.innerHTML=data.analysis?data.analysis.replace(/\n/g,"<br>"):"AI服务忙，请重试";
    res.style.display="block";
  })
  .catch(function(err){
    text.innerHTML="<span style='color:var(--c-danger)'>"+err.message+"</span>";
    res.style.display="block";
  })
  .finally(function(){
    btn.disabled=false;
    btn.innerText="开始 AI 综合对比评估";
  });
}
</script>
</body>
</html>
