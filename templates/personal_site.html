<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Personal Site Designer</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.ps-tab-content{padding:14px;overflow-y:auto;display:none;flex-direction:column;gap:12px}
.ps-tab-content.active{display:flex}
.ps-upload{border:1px dashed var(--c-border);border-radius:12px;background:var(--c-bg-card);padding:10px;position:relative;text-align:center}
.ps-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.ps-upload small{display:block;color:var(--c-text-muted);font-size:.75rem}
.ps-thumb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ps-thumb{border:1px solid var(--c-border);border-radius:12px;background:var(--c-bg-card);padding:8px;cursor:pointer;transition:.22s transform,.22s border-color,.22s box-shadow}
.ps-thumb:hover{transform:translateY(-1px)}
.ps-thumb.active{border-color:var(--c-accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--c-accent) 20%,transparent)}
.ps-mini{height:62px;border-radius:8px;overflow:hidden;border:1px solid var(--c-border);display:flex;position:relative}
.ps-mini .a{flex:1}
.ps-mini .b{width:28%}
.ps-mini.prof .a{background:linear-gradient(180deg,#f8fafc,#e2e8f0)}
.ps-mini.prof .b{background:#bfdbfe}
.ps-mini.dev .a{background:linear-gradient(180deg,#111827,#0b1020)}
.ps-mini.dev .b{background:#0f766e}
.ps-mini.creator .a{background:linear-gradient(180deg,#faf5ff,#f3e8ff)}
.ps-mini.creator .b{background:#e879f9}
.ps-mini.minimal .a{background:#fff}
.ps-mini.minimal .b{background:#f1f5f9}
.ps-mini::after{content:"";position:absolute;left:8px;right:8px;top:9px;height:2px;background:rgba(255,255,255,.45)}
.ps-name{margin-top:6px;font-size:.78rem;font-weight:700}
.ps-sec-list{display:flex;flex-direction:column;gap:8px}
.ps-sec-item{display:flex;align-items:center;gap:8px;border:1px solid var(--c-border);background:var(--c-bg-card);border-radius:10px;padding:8px}
.ps-sec-item input[type=checkbox]{transform:scale(.9)}
.ps-sec-item .nm{font-size:.8rem;font-weight:600;flex:1}
.ps-sec-item button{border:1px solid var(--c-border);background:var(--c-bg-sub);border-radius:8px;padding:3px 7px;font-size:.73rem;cursor:pointer}
.ps-ins-row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.ps-ins-row label{font-size:.74rem;color:var(--c-text-muted);font-weight:700}
.ps-ins-row input,.ps-ins-row textarea,.ps-ins-row select{width:100%;border:1px solid var(--c-border);background:var(--c-bg-card);color:var(--c-text-main);border-radius:8px;padding:8px;font-size:.82rem}
.ps-array-item{border:1px solid var(--c-border);border-radius:10px;background:var(--c-bg-card);padding:8px;margin-bottom:8px}
.ps-array-item h5{font-size:.76rem;margin-bottom:6px}
.ps-array-item .row{display:flex;gap:6px}
.ps-array-item .row>*{flex:1}
.ps-ins-actions{display:flex;gap:8px;margin-bottom:10px}
.ps-ins-actions button{border:1px solid var(--c-border);background:var(--c-bg-sub);border-radius:8px;padding:4px 8px;font-size:.73rem;cursor:pointer}
.ps-ins-actions .danger{background:#ef4444;color:#fff;border-color:#ef4444}
.ps-empty{padding:30px 8px;text-align:center;color:var(--c-text-muted);font-size:.82rem}
</style>
</head>
<body>
<div class="ambient-container"><div class="ambient-glow"></div></div>

<nav class="c-nav glass">
  <div class="c-nav-brand">
    <a href="/" class="c-btn c-btn-ghost" style="padding:4px 8px;margin-right:8px;">← 返回</a>
    Personal Site 设计器
  </div>
  <div class="c-nav-links">
    <div id="save-indicator" style="font-size:.78rem;color:var(--c-text-muted);margin-right:8px;">已就绪</div>
    <button class="c-btn c-btn-secondary" style="height:30px;padding:0 12px;font-size:.78rem" onclick="exportHTML()">导出 HTML</button>
    <button class="c-btn c-btn-primary" style="height:30px;padding:0 14px;font-size:.78rem" onclick="openPublishModal()">发布</button>
  </div>
</nav>

<div class="ed-layout">
  <div class="ed-sidebar glass">
    <div class="ed-tabs">
      <div class="ed-tab active" onclick="switchTab(0)">模板/生成</div>
      <div class="ed-tab" onclick="switchTab(1)">区块结构</div>
      <div class="ed-tab" onclick="switchTab(2)">视觉设置</div>
    </div>
    <div class="ps-tab-content active" id="tab-0">
      <div class="ps-thumb-grid" id="preset-grid"></div>
      <textarea class="c-textarea" id="prompt-input" placeholder="补充你的个人定位、行业与目标（可选）" style="min-height:94px"></textarea>
      <div class="ps-upload">
        <input type="file" accept=".pdf" id="pdf-input" onchange="handleFile(this,'pdf')">
        <strong style="font-size:.8rem">上传 PDF 简历（可选）</strong><small id="pdf-name"></small>
      </div>
      <div class="ps-upload">
        <input type="file" accept="image/*" id="avatar-input" onchange="handleFile(this,'img')">
        <strong style="font-size:.8rem">上传头像（可选）</strong>
        <img id="avatar-preview" style="display:none;max-height:72px;margin:8px auto 0;border-radius:8px;">
      </div>
      <button class="c-btn c-btn-primary w-full" id="btn-generate" onclick="doGenerate()">生成网站方案</button>
    </div>
    <div class="ps-tab-content" id="tab-1">
      <div style="font-size:.75rem;color:var(--c-text-muted);font-weight:700">Section 显隐与排序</div>
      <div class="ps-sec-list" id="section-list"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="c-btn c-btn-secondary" onclick="addBlock('projects')" style="font-size:.76rem">+ Projects</button>
        <button class="c-btn c-btn-secondary" onclick="addBlock('experience')" style="font-size:.76rem">+ Experience</button>
        <button class="c-btn c-btn-secondary" onclick="addBlock('skills')" style="font-size:.76rem">+ Skills</button>
        <button class="c-btn c-btn-secondary" onclick="addBlock('education')" style="font-size:.76rem">+ Education</button>
        <button class="c-btn c-btn-secondary" onclick="addBlock('contact')" style="font-size:.76rem">+ Contact</button>
        <button class="c-btn c-btn-secondary" onclick="addBlock('cta')" style="font-size:.76rem">+ CTA</button>
      </div>
    </div>
    <div class="ps-tab-content" id="tab-2">
      <div class="ps-ins-row"><label>主色</label><input type="color" id="g-primary" onchange="updateTheme()"></div>
      <div class="ps-ins-row"><label>背景</label><input type="color" id="g-bg" onchange="updateTheme()"></div>
      <div class="ps-ins-row"><label>文字</label><input type="color" id="g-text" onchange="updateTheme()"></div>
      <div class="ps-ins-row"><label>圆角</label><select id="g-radius" onchange="updateTheme()"><option value="8px">8px</option><option value="10px">10px</option><option value="14px">14px</option><option value="18px">18px</option></select></div>
      <div class="ps-ins-row"><label>SEO 标题</label><input type="text" id="seo-title" oninput="updateSEO('title',this.value)"></div>
      <div class="ps-ins-row"><label>SEO 描述</label><textarea id="seo-desc" rows="3" oninput="updateSEO('description',this.value)"></textarea></div>
      <div class="ps-ins-row"><label>OG 图片 URL</label><input type="text" id="seo-og" oninput="updateSEO('og_image',this.value)"></div>
    </div>
  </div>

  <div class="ed-canvas-wrapper">
    <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:8px;background:var(--c-bg-glass);padding:4px;border-radius:999px;border:1px solid var(--c-border)">
      <button class="c-btn c-btn-ghost active" style="padding:4px 10px;font-size:.74rem" onclick="setDevice('desktop',this)">桌面</button>
      <button class="c-btn c-btn-ghost" style="padding:4px 10px;font-size:.74rem" onclick="setDevice('mobile',this)">移动</button>
    </div>
    <div class="ed-canvas-container">
      <div class="ed-frame" id="canvas-frame"><iframe id="preview-iframe" sandbox="allow-same-origin allow-scripts allow-popups"></iframe></div>
    </div>
  </div>

  <div class="ed-sidebar ed-sidebar-right glass">
    <div class="ed-panel-header">区块编辑器</div>
    <div id="inspector-empty" class="ps-empty">点击预览区块后可编辑内容</div>
    <div id="inspector-content" style="display:none;padding:12px"></div>
  </div>
</div>

<div class="c-modal-overlay" id="publish-modal">
  <div class="c-modal glass">
    <div class="c-modal-header">
      <h3 class="c-modal-title">发布网站</h3>
      <button class="c-modal-close" onclick="closePublishModal()">×</button>
    </div>
    <div class="c-modal-body">
      <div class="ps-ins-row"><label>Slug</label><input type="text" id="pub-slug" placeholder="可留空自动生成"></div>
      <div class="ps-ins-row"><label>SEO 标题</label><input type="text" id="pub-seo-title"></div>
      <div class="ps-ins-row"><label>SEO 描述</label><textarea id="pub-seo-desc" rows="3"></textarea></div>
    </div>
    <div class="c-modal-footer">
      <button class="c-btn c-btn-primary w-full" id="pub-confirm-btn" onclick="confirmPublish()">立即发布</button>
    </div>
  </div>
</div>

<div class="c-toast" id="wr-toast"></div>

<script>
const TOKEN = localStorage.getItem("token") || localStorage.getItem("admin_token");
let currentSiteId = new URLSearchParams(window.location.search).get("id") || null;
const EditorState = {
  blocks: [],
  theme: { primaryColor:"#2563eb", bgColor:"#f8fafc", textColor:"#0f172a", radius:"14px" },
  seo: { title:"", description:"", og_image:"" },
  template_id: "professional",
  selectedBlockId: null,
  hasUnsavedChanges: false,
  autoSaveTimer: null,
  rendering: false,
  files: { pdf: null, avatar_b64: "" },
  presets: []
};

function gid(){ return Math.random().toString(36).slice(2,10); }
function toast(msg,type){ const t=document.getElementById("wr-toast"); t.textContent=msg; t.className="c-toast show "+(type||""); clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove("show"),2200); }
function switchTab(i){ document.querySelectorAll(".ed-tab").forEach((e,idx)=>e.classList.toggle("active",idx===i)); document.querySelectorAll(".ps-tab-content").forEach((e,idx)=>e.classList.toggle("active",idx===i)); }
function setDevice(type,el){ el.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("active")); el.classList.add("active"); document.getElementById("canvas-frame").classList.toggle("mobile",type==="mobile"); }

function defaultBlock(type){
  const b={id:gid(),type,visible:true,style:{layout:"left",variant:"card"},content:{}};
  if(type==="hero") b.content={name:"Your Name",subtitle:"Your Subtitle",cta:{text:"Contact",url:"#"}};
  if(type==="about") b.content={text:"Introduce yourself."};
  if(type==="projects") b.content={items:[{title:"Project",desc:"Description",tags:["Tag"],link:"",github:"",cover:""}]};
  if(type==="experience") b.content={items:[{company:"Company",role:"Role",period:"2024 - Now",desc:["Achievement"]}]};
  if(type==="education") b.content={items:[{school:"University",degree:"Degree",period:"2018 - 2022"}]};
  if(type==="skills") b.content={items:["Skill A","Skill B"]};
  if(type==="contact") b.content={email:"",phone:"",github:"",linkedin:"",wechat:""};
  if(type==="cta") b.content={title:"Ready to collaborate?",desc:"Let's build together.",button_text:"Contact",button_url:"#"};
  if(type==="stats") b.content={items:[{value:"10+",label:"Projects"}]};
  if(type==="services") b.content={items:[{title:"Service",desc:"Service description"}]};
  if(type==="testimonials") b.content={items:[{author:"Name",role:"Role",text:"Feedback"}]};
  if(type==="footer") b.content={text:"© 2026"};
  return b;
}

function migrateLegacyToBlocks(d){
  if(d && Array.isArray(d.blocks) && d.blocks.length) return d;
  const blocks=[];
  if(d && d.hero) blocks.push({id:gid(),type:"hero",visible:true,style:{layout:"left",variant:"card"},content:{name:d.hero.name||"",subtitle:d.hero.tagline||"",avatar:d.hero.avatar||""}});
  if(d && d.about) blocks.push({id:gid(),type:"about",visible:true,style:{layout:"left",variant:"minimal"},content:{text:d.about}});
  if(d && Array.isArray(d.projects) && d.projects.length){
    blocks.push({id:gid(),type:"projects",title:"Projects",visible:true,style:{layout:"grid",variant:"card"},content:{items:d.projects.map(p=>({title:p.name||"",desc:p.description||"",tags:p.tags||[],link:p.link||"",github:p.github||"",cover:p.cover||""}))}});
  }
  if(d && Array.isArray(d.skills) && d.skills.length){
    const items = typeof d.skills[0] === "string" ? d.skills : (d.skills[0].items||[]);
    blocks.push({id:gid(),type:"skills",title:"Skills",visible:true,style:{layout:"left",variant:"card"},content:{items}});
  }
  if(!blocks.length) blocks.push(defaultBlock("hero"));
  if(!blocks.some(b=>b.type==="cta")) blocks.push(defaultBlock("cta"));
  if(!blocks.some(b=>b.type==="footer")) blocks.push(defaultBlock("footer"));
  return { blocks, template_id: d && d.template_id ? d.template_id : "professional", theme: d && d.theme ? d.theme : undefined, seo: d && d.seo ? d.seo : undefined };
}

function applyPresetData(siteData, schedule){
  const migrated = migrateLegacyToBlocks(siteData || {});
  EditorState.blocks = migrated.blocks || [];
  EditorState.template_id = migrated.template_id || "professional";
  if(migrated.theme) EditorState.theme = migrated.theme;
  if(migrated.seo) EditorState.seo = migrated.seo;
  updateThemeUI();
  renderPresetGrid();
  renderSectionList();
  renderCanvas();
  if(schedule) scheduleAutoSave();
}

async function loadPresets(){
  try{
    const r=await fetch("/api/v1/personal-site/presets");
    const d=await r.json();
    if(d.success && Array.isArray(d.data)) EditorState.presets=d.data;
  }catch(e){}
  renderPresetGrid();
}

function renderPresetGrid(){
  const g=document.getElementById("preset-grid");
  g.innerHTML="";
  const order=["professional","developer","creator","minimal"];
  const labels={professional:"求职型 Professional Resume Site",developer:"开发者型 Developer Portfolio",creator:"创作者型 Personal Brand Page",minimal:"极简型 Minimal Landing Page"};
  order.forEach(id=>{
    const item=document.createElement("div");
    item.className="ps-thumb"+(EditorState.template_id===id?" active":"");
    item.onclick=()=>applyPreset(id);
    item.innerHTML=`<div class="ps-mini ${id==='professional'?'prof':id}"><div class="a"></div><div class="b"></div></div><div class="ps-name">${labels[id]}</div>`;
    g.appendChild(item);
  });
}

async function applyPreset(id){
  const p = EditorState.presets.find(x=>x.id===id);
  if(p && p.site_data){ applyPresetData(JSON.parse(JSON.stringify(p.site_data)), true); return; }
  try{
    const r = await fetch("/api/v1/personal-site/generate",{method:"POST",headers:{"Content-Type":"application/json",...(TOKEN?{"Authorization":"Bearer "+TOKEN}:{})},body:JSON.stringify({preset_id:id})});
    const d = await r.json();
    if(d.success && d.data && d.data.site_data){ applyPresetData(d.data.site_data, true); toast("模板已套用"); }
  }catch(e){ toast("模板加载失败","error"); }
}

function handleFile(input,mode){
  if(!input.files || !input.files[0]) return;
  if(mode==="pdf"){ EditorState.files.pdf=input.files[0]; document.getElementById("pdf-name").textContent=input.files[0].name; return; }
  const fr=new FileReader();
  fr.onload=e=>{ EditorState.files.avatar_b64=e.target.result; const img=document.getElementById("avatar-preview"); img.src=e.target.result; img.style.display="block"; };
  fr.readAsDataURL(input.files[0]);
}

async function doGenerate(){
  const prompt=document.getElementById("prompt-input").value.trim();
  if(!prompt && !EditorState.files.pdf){ toast("请输入描述或上传 PDF","error"); return; }
  const btn=document.getElementById("btn-generate");
  btn.disabled=true; btn.textContent="生成中...";
  try{
    const fd=new FormData();
    fd.append("prompt",prompt);
    fd.append("preset_id",EditorState.template_id);
    if(EditorState.files.pdf) fd.append("pdf",EditorState.files.pdf);
    if(EditorState.files.avatar_b64){ const blob=await (await fetch(EditorState.files.avatar_b64)).blob(); fd.append("avatar",blob,"avatar.jpg"); }
    const r=await fetch("/api/v1/personal-site/generate",{method:"POST",headers:{...(TOKEN?{"Authorization":"Bearer "+TOKEN}:{})},body:fd});
    const d=await r.json();
    if(d.success && d.data && d.data.site_data){ applyPresetData(d.data.site_data,true); toast("方案已生成"); }
    else toast(d.message||"生成失败","error");
  }catch(e){ toast("生成失败","error"); }
  finally{ btn.disabled=false; btn.textContent="生成网站方案"; }
}

function addBlock(type){ const b=defaultBlock(type); EditorState.blocks.push(b); renderSectionList(); selectBlock(b.id); scheduleAutoSave(); renderCanvas(); }
function removeBlock(id){ EditorState.blocks=EditorState.blocks.filter(b=>b.id!==id); if(EditorState.selectedBlockId===id) EditorState.selectedBlockId=null; renderSectionList(); scheduleAutoSave(); renderCanvas(); selectBlock(EditorState.selectedBlockId); }
function duplicateBlock(i){ const cp=JSON.parse(JSON.stringify(EditorState.blocks[i])); cp.id=gid(); EditorState.blocks.splice(i+1,0,cp); renderSectionList(); scheduleAutoSave(); renderCanvas(); selectBlock(cp.id); }
function moveBlock(i,dir){ const j=i+dir; if(j<0||j>=EditorState.blocks.length)return; const t=EditorState.blocks[i]; EditorState.blocks[i]=EditorState.blocks[j]; EditorState.blocks[j]=t; renderSectionList(); scheduleAutoSave(); renderCanvas(); }
function toggleVisible(id,v){ const b=EditorState.blocks.find(x=>x.id===id); if(!b)return; b.visible=v; scheduleAutoSave(); renderCanvas(); }

function secLabel(t){ const m={hero:"Hero",about:"About",projects:"Projects",skills:"Skills",experience:"Experience",education:"Education",contact:"Contact",cta:"CTA",stats:"Stats",services:"Services",testimonials:"Testimonials",footer:"Footer"}; return m[t]||t; }
function renderSectionList(){
  const c=document.getElementById("section-list"); c.innerHTML="";
  EditorState.blocks.forEach((b,i)=>{
    const row=document.createElement("div");
    row.className="ps-sec-item";
    row.innerHTML=`<input type="checkbox" ${b.visible!==false?"checked":""}><span class="nm">${secLabel(b.type)}</span><button>↑</button><button>↓</button><button>编辑</button>`;
    row.querySelector("input").onchange=e=>toggleVisible(b.id,e.target.checked);
    row.querySelectorAll("button")[0].onclick=()=>moveBlock(i,-1);
    row.querySelectorAll("button")[1].onclick=()=>moveBlock(i,1);
    row.querySelectorAll("button")[2].onclick=()=>{ switchTab(1); selectBlock(b.id); };
    c.appendChild(row);
  });
}

function updateThemeUI(){
  document.getElementById("g-primary").value=EditorState.theme.primaryColor||"#2563eb";
  document.getElementById("g-bg").value=EditorState.theme.bgColor||"#f8fafc";
  document.getElementById("g-text").value=EditorState.theme.textColor||"#0f172a";
  document.getElementById("g-radius").value=EditorState.theme.radius||"14px";
  document.getElementById("seo-title").value=EditorState.seo.title||"";
  document.getElementById("seo-desc").value=EditorState.seo.description||"";
  document.getElementById("seo-og").value=EditorState.seo.og_image||"";
}
function updateTheme(){ EditorState.theme.primaryColor=document.getElementById("g-primary").value; EditorState.theme.bgColor=document.getElementById("g-bg").value; EditorState.theme.textColor=document.getElementById("g-text").value; EditorState.theme.radius=document.getElementById("g-radius").value; scheduleAutoSave(); renderCanvas(); }
function updateSEO(k,v){ EditorState.seo[k]=v; scheduleAutoSave(); renderCanvas(); }

function patchBlock(id,fn){ const b=EditorState.blocks.find(x=>x.id===id); if(!b)return; fn(b); scheduleAutoSave(); renderCanvas(); }
function updateBlockTitle(id,v){ patchBlock(id,b=>{ b.title=v; }); }
function updateBlockStyle(id,key,v){ patchBlock(id,b=>{ b.style=b.style||{}; b.style[key]=v; }); }
function updateBlockContent(id,key,v){ patchBlock(id,b=>{ b.content=b.content||{}; b.content[key]=v; }); }
function updateItemField(id,idx,key,v){ patchBlock(id,b=>{ b.content=b.content||{}; if(!Array.isArray(b.content.items)) b.content.items=[]; if(!b.content.items[idx]) b.content.items[idx]={}; b.content.items[idx][key]=v; }); }
function removeItem(id,idx){ patchBlock(id,b=>{ if(!b.content||!Array.isArray(b.content.items))return; b.content.items.splice(idx,1); }); selectBlock(id); }
function addItem(id,type){
  const seed={
    projects:{title:"Project",desc:"Description",tags:["Tag"],link:"",github:"",cover:""},
    experience:{company:"Company",role:"Role",period:"2024 - Now",desc:["Achievement"]},
    education:{school:"School",degree:"Degree",period:""},
    stats:{value:"10+",label:"Metric"},
    services:{title:"Service",desc:"Description"},
    testimonials:{author:"Name",role:"Role",text:"Feedback"}
  }[type] || {};
  patchBlock(id,b=>{ b.content=b.content||{}; if(!Array.isArray(b.content.items)) b.content.items=[]; b.content.items.push(seed); });
  selectBlock(id);
}

function renderArrayEditor(id,b,type){
  const items=(b.content&&Array.isArray(b.content.items))?b.content.items:[];
  let html='<div class="ps-ins-row"><label>列表项</label></div>';
  items.forEach((it,idx)=>{
    if(typeof it==="string"){
      html+=`<div class="ps-array-item"><h5>Item ${idx+1}</h5><div class="ps-ins-row"><input type="text" value="${String(it).replace(/"/g,"&quot;")}" oninput="patchBlock('${id}',function(b){b.content.items[${idx}]=this.value}.bind(this))"></div><button class="c-btn c-btn-secondary" style="font-size:.72rem" onclick="removeItem('${id}',${idx})">删除</button></div>`;
      return;
    }
    const e=(v)=>String(v||"").replace(/"/g,"&quot;");
    html+=`<div class="ps-array-item"><h5>Item ${idx+1}</h5>`;
    if(type==="projects"){
      html+=`<div class="row"><input placeholder="标题" value="${e(it.title)}" oninput="updateItemField('${id}',${idx},'title',this.value)"><input placeholder="封面URL" value="${e(it.cover)}" oninput="updateItemField('${id}',${idx},'cover',this.value)"></div>
      <div class="ps-ins-row"><textarea rows="2" placeholder="描述" oninput="updateItemField('${id}',${idx},'desc',this.value)">${e(it.desc)}</textarea></div>
      <div class="row"><input placeholder="链接" value="${e(it.link)}" oninput="updateItemField('${id}',${idx},'link',this.value)"><input placeholder="GitHub" value="${e(it.github)}" oninput="updateItemField('${id}',${idx},'github',this.value)"></div>
      <div class="ps-ins-row"><input placeholder="tags 逗号分隔" value="${Array.isArray(it.tags)?it.tags.join(', '):e(it.tags)}" oninput="updateItemField('${id}',${idx},'tags',this.value.split(',').map(function(s){return s.trim()}).filter(Boolean))"></div>`;
    }else if(type==="experience"){
      html+=`<div class="row"><input placeholder="公司" value="${e(it.company)}" oninput="updateItemField('${id}',${idx},'company',this.value)"><input placeholder="职位" value="${e(it.role)}" oninput="updateItemField('${id}',${idx},'role',this.value)"></div>
      <div class="row"><input placeholder="时间" value="${e(it.period)}" oninput="updateItemField('${id}',${idx},'period',this.value)"></div>
      <div class="ps-ins-row"><textarea rows="2" placeholder="成就（每行一条）" oninput="updateItemField('${id}',${idx},'desc',this.value.split('\n').map(function(s){return s.trim()}).filter(Boolean))">${Array.isArray(it.desc)?it.desc.join('\n'):e(it.desc)}</textarea></div>`;
    }else if(type==="education"){
      html+=`<div class="row"><input placeholder="学校" value="${e(it.school)}" oninput="updateItemField('${id}',${idx},'school',this.value)"><input placeholder="学位/专业" value="${e(it.degree)}" oninput="updateItemField('${id}',${idx},'degree',this.value)"></div>
      <div class="row"><input placeholder="时间" value="${e(it.period)}" oninput="updateItemField('${id}',${idx},'period',this.value)"></div>`;
    }else if(type==="stats"){
      html+=`<div class="row"><input placeholder="数值" value="${e(it.value)}" oninput="updateItemField('${id}',${idx},'value',this.value)"><input placeholder="标签" value="${e(it.label)}" oninput="updateItemField('${id}',${idx},'label',this.value)"></div>`;
    }else if(type==="services"){
      html+=`<div class="row"><input placeholder="服务名" value="${e(it.title)}" oninput="updateItemField('${id}',${idx},'title',this.value)"></div><div class="ps-ins-row"><textarea rows="2" placeholder="描述" oninput="updateItemField('${id}',${idx},'desc',this.value)">${e(it.desc)}</textarea></div>`;
    }else if(type==="testimonials"){
      html+=`<div class="row"><input placeholder="姓名" value="${e(it.author)}" oninput="updateItemField('${id}',${idx},'author',this.value)"><input placeholder="身份" value="${e(it.role)}" oninput="updateItemField('${id}',${idx},'role',this.value)"></div><div class="ps-ins-row"><textarea rows="2" placeholder="评价" oninput="updateItemField('${id}',${idx},'text',this.value)">${e(it.text)}</textarea></div>`;
    }
    html+=`<button class="c-btn c-btn-secondary" style="font-size:.72rem" onclick="removeItem('${id}',${idx})">删除</button></div>`;
  });
  html+=`<button class="c-btn c-btn-secondary" style="font-size:.75rem" onclick="addItem('${id}','${type}')">+ 添加项</button>`;
  return html;
}

function selectBlock(id){
  EditorState.selectedBlockId=id;
  const empty=document.getElementById("inspector-empty");
  const pane=document.getElementById("inspector-content");
  if(!id){ empty.style.display="block"; pane.style.display="none"; pane.innerHTML=""; return; }
  const idx=EditorState.blocks.findIndex(b=>b.id===id);
  const b=EditorState.blocks[idx];
  if(!b){ empty.style.display="block"; pane.style.display="none"; return; }
  empty.style.display="none"; pane.style.display="block";
  const s=b.style||{layout:"left",variant:"card"};
  let html=`<div class="ps-ins-actions"><button onclick="moveBlock(${idx},-1)">上移</button><button onclick="moveBlock(${idx},1)">下移</button><button onclick="duplicateBlock(${idx})">复制</button><button class="danger" onclick="removeBlock('${id}')">删除</button></div>`;
  html+=`<div class="ps-ins-row"><label>区块标题</label><input type="text" value="${(b.title||"").replace(/"/g,"&quot;")}" oninput="updateBlockTitle('${id}',this.value)"></div>`;
  html+=`<div class="ps-ins-row"><label>布局</label><select onchange="updateBlockStyle('${id}','layout',this.value)"><option value="left" ${s.layout==="left"?"selected":""}>left</option><option value="center" ${s.layout==="center"?"selected":""}>center</option><option value="grid" ${s.layout==="grid"?"selected":""}>grid</option></select></div>`;
  html+=`<div class="ps-ins-row"><label>样式</label><select onchange="updateBlockStyle('${id}','variant',this.value)"><option value="minimal" ${s.variant==="minimal"?"selected":""}>minimal</option><option value="card" ${s.variant==="card"?"selected":""}>card</option><option value="solid" ${s.variant==="solid"?"selected":""}>solid</option></select></div>`;
  const c=b.content||{};
  const e=v=>String(v||"").replace(/"/g,"&quot;");
  if(b.type==="hero"){
    html+=`<div class="ps-ins-row"><label>姓名</label><input value="${e(c.name)}" oninput="updateBlockContent('${id}','name',this.value)"></div>
    <div class="ps-ins-row"><label>副标题</label><input value="${e(c.subtitle)}" oninput="updateBlockContent('${id}','subtitle',this.value)"></div>
    <div class="ps-ins-row"><label>头像 URL</label><input value="${e(c.avatar)}" oninput="updateBlockContent('${id}','avatar',this.value)"></div>
    <div class="ps-ins-row"><label>CTA 文字</label><input value="${e((c.cta||{}).text)}" oninput="patchBlock('${id}',function(b){b.content.cta=b.content.cta||{};b.content.cta.text=this.value}.bind(this))"></div>
    <div class="ps-ins-row"><label>CTA 链接</label><input value="${e((c.cta||{}).url)}" oninput="patchBlock('${id}',function(b){b.content.cta=b.content.cta||{};b.content.cta.url=this.value}.bind(this))"></div>
    <div class="ps-ins-row"><label>GitHub</label><input value="${e(c.github)}" oninput="updateBlockContent('${id}','github',this.value)"></div>
    <div class="ps-ins-row"><label>LinkedIn</label><input value="${e(c.linkedin)}" oninput="updateBlockContent('${id}','linkedin',this.value)"></div>`;
  }else if(b.type==="about"){
    html+=`<div class="ps-ins-row"><label>内容</label><textarea rows="5" oninput="updateBlockContent('${id}','text',this.value)">${e(c.text)}</textarea></div>`;
  }else if(["projects","experience","education","stats","services","testimonials"].includes(b.type)){
    html+=renderArrayEditor(id,b,b.type);
  }else if(b.type==="skills"){
    html+=`<div class="ps-ins-row"><label>技能（逗号分隔）</label><textarea rows="4" oninput="updateBlockContent('${id}','items',this.value.split(',').map(function(s){return s.trim()}).filter(Boolean))">${Array.isArray(c.items)?c.items.join(", "):e(c.items)}</textarea></div>`;
  }else if(b.type==="contact"){
    ["email","phone","github","linkedin","wechat"].forEach(k=>{ html+=`<div class="ps-ins-row"><label>${k}</label><input value="${e(c[k])}" oninput="updateBlockContent('${id}','${k}',this.value)"></div>`; });
  }else if(b.type==="cta"){
    html+=`<div class="ps-ins-row"><label>标题</label><input value="${e(c.title)}" oninput="updateBlockContent('${id}','title',this.value)"></div>
    <div class="ps-ins-row"><label>描述</label><textarea rows="3" oninput="updateBlockContent('${id}','desc',this.value)">${e(c.desc)}</textarea></div>
    <div class="ps-ins-row"><label>按钮文案</label><input value="${e(c.button_text)}" oninput="updateBlockContent('${id}','button_text',this.value)"></div>
    <div class="ps-ins-row"><label>按钮链接</label><input value="${e(c.button_url)}" oninput="updateBlockContent('${id}','button_url',this.value)"></div>`;
  }else if(b.type==="footer"){
    html+=`<div class="ps-ins-row"><label>Footer 文案</label><input value="${e(c.text)}" oninput="updateBlockContent('${id}','text',this.value)"></div>`;
  }
  pane.innerHTML=html;
}

async function renderCanvas(){
  if(EditorState.rendering) return;
  EditorState.rendering=true;
  try{
    const payload={site_data:{blocks:EditorState.blocks,theme:EditorState.theme,seo:EditorState.seo,template_id:EditorState.template_id},style:EditorState.template_id};
    const r=await fetch("/api/v1/personal-site/preview",{method:"POST",headers:{"Content-Type":"application/json",...(TOKEN?{"Authorization":"Bearer "+TOKEN}:{})},body:JSON.stringify(payload)});
    const d=await r.json();
    if(d.success){
      const html=d.data.html.replace("</body>",`<style>section[id^="block-"],footer[id^="block-"]{position:relative;cursor:pointer}section[id^="block-"]:hover::after,footer[id^="block-"]:hover::after{content:'';position:absolute;inset:0;border:1px solid rgba(37,99,235,.35);pointer-events:none}section.sel::after,footer.sel::after{content:'';position:absolute;inset:0;border:2px solid #2563eb;pointer-events:none}</style><script>document.querySelectorAll('section[id^="block-"],footer[id^="block-"]').forEach(function(el){el.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();document.querySelectorAll('section[id^="block-"],footer[id^="block-"]').forEach(function(n){n.classList.remove('sel')});el.classList.add('sel');window.parent.postMessage({type:'ps_sel',id:el.id.replace('block-','')},'*')})});<\/script></body>`);
      document.getElementById("preview-iframe").srcdoc=html;
    }
  }catch(e){}
  EditorState.rendering=false;
}

window.addEventListener("message",e=>{ if(e.data && e.data.type==="ps_sel"){ selectBlock(e.data.id); }});

const saveIndicator=document.getElementById("save-indicator");
function markSaving(){ saveIndicator.textContent="保存中..."; saveIndicator.style.color="var(--c-warning)"; }
function markSavedCloud(){ saveIndicator.textContent="已云端保存"; saveIndicator.style.color="var(--c-text-muted)"; EditorState.hasUnsavedChanges=false; }
function markSavedLocal(){ saveIndicator.textContent="已本地保存"; saveIndicator.style.color="var(--c-text-muted)"; EditorState.hasUnsavedChanges=false; }
function markSaveError(){ saveIndicator.textContent="保存失败（将重试）"; saveIndicator.style.color="var(--c-danger)"; }

function scheduleAutoSave(){
  if(!TOKEN){ markSavedLocal(); return; }
  EditorState.hasUnsavedChanges=true;
  markSaving();
  clearTimeout(EditorState.autoSaveTimer);
  EditorState.autoSaveTimer=setTimeout(performAutoSave,1200);
}
async function performAutoSave(){
  if(!TOKEN){ markSavedLocal(); return; }
  const payload={site_id:currentSiteId,site_data:{blocks:EditorState.blocks,theme:EditorState.theme,seo:EditorState.seo,template_id:EditorState.template_id},prompt:document.getElementById("prompt-input").value.trim()};
  try{
    const r=await fetch("/api/v1/personal-site/auto-save",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},body:JSON.stringify(payload)});
    const d=await r.json();
    if(d.success){ currentSiteId=d.data.site_id; const url=new URL(window.location); if(!url.searchParams.get("id")){ url.searchParams.set("id",currentSiteId); window.history.replaceState({}, "", url);} markSavedCloud(); }
    else markSaveError();
  }catch(e){ markSaveError(); }
}

window.onbeforeunload=function(e){ if(EditorState.hasUnsavedChanges){ const m="有未保存更改"; e.returnValue=m; return m; } };

function openPublishModal(){
  if(!TOKEN){ toast("请先登录后发布","error"); return; }
  const hero=EditorState.blocks.find(b=>b.type==="hero");
  document.getElementById("pub-seo-title").value=EditorState.seo.title || ((hero&&hero.content&&hero.content.name)?hero.content.name+" | Personal Site":"Personal Site");
  document.getElementById("pub-seo-desc").value=EditorState.seo.description || ((hero&&hero.content&&hero.content.subtitle)?hero.content.subtitle:"");
  document.getElementById("publish-modal").classList.add("show");
}
function closePublishModal(){ document.getElementById("publish-modal").classList.remove("show"); }

async function confirmPublish(){
  const btn=document.getElementById("pub-confirm-btn");
  btn.disabled=true; btn.textContent="发布中...";
  EditorState.seo.title=document.getElementById("pub-seo-title").value.trim();
  EditorState.seo.description=document.getElementById("pub-seo-desc").value.trim();
  try{
    const payload={site_id:currentSiteId,site_data:{blocks:EditorState.blocks,theme:EditorState.theme,seo:EditorState.seo,template_id:EditorState.template_id},slug:document.getElementById("pub-slug").value.trim(),seo_title:EditorState.seo.title,seo_description:EditorState.seo.description};
    const r=await fetch("/api/v1/personal-site/publish",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},body:JSON.stringify(payload)});
    const d=await r.json();
    if(d.success){ currentSiteId=d.data.site_id; EditorState.hasUnsavedChanges=false; markSavedCloud(); closePublishModal(); toast("发布成功"); window.open(d.data.url,"_blank"); }
    else toast(d.message||"发布失败","error");
  }catch(e){ toast("发布失败","error"); }
  btn.disabled=false; btn.textContent="立即发布";
}

async function exportHTML(){
  try{
    const payload={site_data:{blocks:EditorState.blocks,theme:EditorState.theme,seo:EditorState.seo,template_id:EditorState.template_id},style:EditorState.template_id};
    const r=await fetch("/api/v1/personal-site/export-html",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(!r.ok){ toast("导出失败","error"); return; }
    const blob=await r.blob(); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="personal_site.html"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast("已导出 HTML");
  }catch(e){ toast("导出失败","error"); }
}

async function init(){
  await loadPresets();
  if(currentSiteId && TOKEN){
    try{
      const r=await fetch("/api/v1/personal-site/"+currentSiteId,{headers:{"Authorization":"Bearer "+TOKEN}});
      const d=await r.json();
      if(d.success && d.data && d.data.site_data){ applyPresetData(d.data.site_data,false); }
    }catch(e){}
  }
  if(!EditorState.blocks.length){
    const p=EditorState.presets.find(x=>x.id==="professional");
    if(p && p.site_data) applyPresetData(p.site_data,false);
    else { EditorState.blocks=[defaultBlock("hero"),defaultBlock("about"),defaultBlock("projects"),defaultBlock("contact"),defaultBlock("cta"),defaultBlock("footer")]; renderSectionList(); renderCanvas(); }
  }
}
init();
</script>
