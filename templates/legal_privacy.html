<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐私政策 - AI 简历生成器</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .legal-container { max-width: 800px; margin: 80px auto; padding: 40px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .legal-header { text-align: center; margin-bottom: 40px; }
        .legal-header h1 { margin-bottom: 10px; font-weight: 600; }
        .legal-content h2 { margin-top: 30px; font-size: 1.2rem; }
        .legal-content p, .legal-content li { color: #C4C4CC; line-height: 1.6; }
    </style>
</head>
<body class="dark bg-black text-white">
    <div class="legal-container">
        <div class="legal-header"><h1>隐私政策 (Privacy Policy)</h1></div>
        <div class="legal-content">
            <h2>信息收集</h2>
            <p>当您注册或填写简历时，我们会采集您的名称、工作经历、联系方式及账单信息。这些内容仅仅为了向您下发核心的排版与呈现服务。</p>
            <h2>大模型传输说明</h2>
            <p>对于您启用 AI 扩写的功能，您的相关句子会被安全加密传输给后端指定的 LLM。我们将确保供应商不在其公网模型里用您的个人数据训练。</p>
            <h2>您的数据权利 (GDPR 准则)</h2>
            <ul>
                <li><strong>导出：</strong>我们提供一键导出工具，将您的所有简历带走。</li>
                <li><strong>擦除（注销）：</strong>若您选择账户注销，您的认证信息将进入硬散列脱敏层，切断物理关联，业务记录将在 30天 冷却后完全彻底粉碎清理，不留残影。</li>
            </ul>
        </div>
    </div>
</body>
</html>
